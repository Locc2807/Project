<!DOCTYPE html>
<html lang="vi">
<head th:replace="admin/fragment/head :: head"></head>
<body class="bg-gray-100 font-sans">

	<!-- Topbar -->
	<div th:replace="admin/fragment/header :: header"></div>

	<!-- Layout -->
	<div class="flex pt-14 min-h-screen">
		<!-- Sidebar -->
		<div th:replace="admin/fragment/aside :: aside" class="h-full"></div>

		<!-- Main Area -->
		<div class="flex flex-col flex-1 overflow-y-auto p-6">
			<!-- Form Nhập Hàng Nhanh -->
			<div class="bg-white p-6 rounded-xl shadow mb-6 max-w-2xl mx-auto">
				<h2 class="text-2xl font-semibold text-gray-800 mb-4">
					<i class="fa-solid fa-box"></i> Nhập hàng nhanh
				</h2>

				<!-- Thông tin sản phẩm -->
				<div class="bg-gray-50 p-4 rounded-lg mb-6">
					<div class="flex items-center gap-4">
						<img th:src="@{'/uploads/' + ${product.image}}" 
							alt="Product" class="h-20 w-20 object-cover rounded">
						<div>
							<h3 class="font-semibold text-lg" th:text="${product.name}"></h3>
							<p class="text-sm text-gray-600">
								Giá: <span th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')}"></span> VNĐ
							</p>
							<p class="text-sm text-gray-600" th:if="${inventory != null}">
								Tồn kho hiện tại: 
								<span class="font-bold" 
									th:classappend="${inventory.quantity <= 0 ? 'text-red-600' : 'text-green-600'}"
									th:text="${inventory.quantity}"></span>
							</p>
						</div>
					</div>
				</div>

				<!-- Form nhập hàng -->
				<form th:action="@{/admin/product/quick-stock/{id}(id=${product.id})}" 
					method="post" class="space-y-4">
					
					<!-- Số lượng -->
					<div>
						<label for="quantity" class="block text-sm font-medium text-gray-700 mb-1">
							Số lượng nhập <span class="text-red-500">*</span>
						</label>
						<input type="number" id="quantity" name="quantity" 
							min="1" required
							class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" 
							placeholder="Nhập số lượng..."/>
					</div>

					<!-- Ghi chú -->
					<div>
						<label for="note" class="block text-sm font-medium text-gray-700 mb-1">
							Ghi chú
						</label>
						<textarea id="note" name="note" rows="3"
							class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
							placeholder="Nhập ghi chú (tùy chọn)..."></textarea>
					</div>

					<!-- Buttons -->
					<div class="flex gap-2">
						<button type="submit"
							class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-4 py-2 rounded shadow transition">
							<i class="fa-solid fa-check"></i> Xác nhận nhập hàng
						</button>
						<a th:href="@{/admin/product}"
							class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-medium px-4 py-2 rounded shadow transition">
							<i class="fa-solid fa-times"></i> Hủy
						</a>
					</div>
				</form>
			</div>

			<!-- Footer -->
			<div th:replace="admin/fragment/footer :: footer" class="mt-auto"></div>
		</div>
	</div>

	<div th:replace="admin/fragment/script :: script"></div>
	
</body>
</html>
