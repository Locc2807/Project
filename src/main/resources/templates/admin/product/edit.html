<!DOCTYPE html>
<html lang="vi">
<head th:replace="admin/fragment/head :: head"></head>
<body class="bg-gray-100 font-sans">

	<!-- Topbar -->
	<div th:replace="admin/fragment/header :: header"></div>

	<!-- Layout -->
	<div class="flex pt-14 min-h-screen">
		<!-- Sidebar -->
		<div th:replace="admin/fragment/aside :: aside" class="h-full"></div>

		<!-- Main Area -->
		<div class="flex flex-col flex-1 overflow-y-auto p-6">
			<!-- Form Thêm Sản Phẩm -->
			<div class="bg-white p-6 rounded-xl shadow mb-6">
				<h2 class="text-2xl font-semibold text-gray-800 mb-4">Thêm sản
					phẩm</h2>

				<form th:action="@{/admin/edit-product}" method="post"
					th:object="${product}" enctype="multipart/form-data"
					class="space-y-4">
					<input type="hidden" th:field="*{id}" />

					<!-- Thông tin kho (nếu có) -->
					<div th:if="${inventory != null}" 
						class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
						<h3 class="text-lg font-semibold text-blue-800 mb-3">
							<i class="fa-solid fa-warehouse"></i> Thông tin kho
						</h3>
						<div class="grid grid-cols-2 gap-4">
							<div>
								<span class="text-sm text-gray-600">Tồn kho hiện tại:</span>
								<span class="ml-2 font-bold text-lg" 
									th:classappend="${inventory.quantity <= 0 ? 'text-red-600' : (inventory.lowStock ? 'text-yellow-600' : 'text-green-600')}"
									th:text="${inventory.quantity}"></span>
							</div>
							<div>
								<span class="text-sm text-gray-600">Mức tồn tối thiểu:</span>
								<span class="ml-2 font-semibold" th:text="${inventory.minStockLevel}"></span>
							</div>
							<div>
								<span class="text-sm text-gray-600">Trạng thái:</span>
								<span class="ml-2 px-2 py-1 rounded text-xs font-semibold"
									th:classappend="${inventory.quantity <= 0 ? 'bg-red-100 text-red-800' : (inventory.lowStock ? 'bg-yellow-100 text-yellow-800' : 'bg-green-100 text-green-800')}"
									th:text="${inventory.quantity <= 0 ? 'Hết hàng' : (inventory.lowStock ? 'Sắp hết' : 'Còn hàng')}"></span>
							</div>
							<div>
								<span class="text-sm text-gray-600">Cập nhật lần cuối:</span>
								<span class="ml-2 text-sm" 
									th:text="${inventory.lastUpdated != null ? #dates.format(inventory.lastUpdated, 'dd/MM/yyyy HH:mm') : 'Chưa có'}"></span>
							</div>
						</div>
						<div class="mt-3">
							<a th:href="@{/admin/product/{id}/price-history(id=${product.id})}" 
								class="text-blue-600 hover:underline text-sm">
								<i class="fa-solid fa-history"></i> Xem lịch sử thay đổi giá
							</a>
							<span class="mx-2 text-gray-300">|</span>
							<a th:href="@{/admin/inventory/transactions/{id}(id=${product.id})}" 
								class="text-blue-600 hover:underline text-sm">
								<i class="fa-solid fa-box-open"></i> Xem lịch sử nhập/xuất
							</a>
						</div>
					</div>

					<!-- Tên sản phẩm -->
					<div>
						<label for="name"
							class="block text-sm font-medium text-gray-700 mb-1">Tên
							sản phẩm</label> <input type="text" id="name" th:field="*{name}" required
							class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
					</div>

					<!-- Giá -->
					<div>
						<label for="price"
							class="block text-sm font-medium text-gray-700 mb-1">Giá</label>
						<input type="number" step="0.01" id="price" th:field="*{price}"
							required
							class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
					</div>

					<!-- Trạng thái -->
					<div>
						<label for="status"
							class="block text-sm font-medium text-gray-700 mb-1">Trạng
							thái</label> <select id="status" th:field="*{status}"
							class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
							<option value="true">Hiển thị</option>
							<option value="false">Ẩn</option>
						</select>
					</div>

					<!-- Danh mục -->
					<div>
						<label for="category"
							class="block text-sm font-medium text-gray-700 mb-1">Danh
							mục</label> <select id="category" th:field="*{category.id}"
							class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
							<option th:each="category : ${listCate}"
								th:value="${category.id}" th:text="${category.name}"></option>
						</select>
					</div>

					<!-- Ngày tạo -->
					<div>
						<label for="created"
							class="block text-sm font-medium text-gray-700 mb-1">Ngày
							tạo</label> <input type="date" id="created" th:field="*{created}"
							class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
					</div>

					<!-- Mô tả -->
					<div>
						<label for="description"
							class="block text-sm font-medium text-gray-700 mb-1">Mô
							tả</label>
						<textarea id="summernote" th:field="*{description}"></textarea>
					</div>

					<!-- Hình ảnh -->
					<div>
						<label for="image"
							class="block text-sm font-medium text-gray-700 mb-1">Hình
							ảnh</label> <input type="file" id="image" name="imageFile"
							class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
							<input type="hidden" th:field="*{image}" />
					</div>

					<!-- Nút gửi -->
					<div>
						<button type="submit"
							class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-4 py-2 rounded shadow transition">
							Cập nhật</button>
					</div>
				</form>
			</div>

			<!-- Footer -->
			<div th:replace="admin/fragment/footer :: footer" class="mt-auto"></div>
		</div>
	</div>

	<!-- Toast -->
	<div id="toast"
		class="fixed bottom-5 right-5 hidden bg-green-600 text-white px-4 py-2 rounded shadow z-50">
		Sản phẩm đã được thêm thành công</div>

	<div th:replace="admin/fragment/script :: script"></div>
	<script>
	document.addEventListener("DOMContentLoaded", function () {
		$('#summernote').summernote({
			placeholder: 'Nhập mô tả sản phẩm...',
			tabsize: 2,
			height: 200
		});
	});
</script>
	
</body>
</html>
