<div th:fragment="header" xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
	th:inline="javascript">
	<header>
		<!-- TOP HEADER -->
		<div id="top-header">
			<div class="container">
				<ul class="header-links pull-left list-unstyled mb-0">
					<li><a href="#"><i class="fa fa-phone"></i> +021-95-51-84</a></li>
					<li><a href="#"><i class="fa fa-envelope-o"></i>
							email@email.com</a></li>
				</ul>
				<ul
					class="header-links pull-right list-unstyled mb-0 d-flex align-items-center">

					<!-- Nếu chưa đăng nhập -->
					<li sec:authorize="isAnonymous()"><a th:href="@{/user/login}"
						class="text-decoration-none"> <i class="fa fa-user-o"></i> My
							Account
					</a></li>

					<!-- Nếu đã đăng nhập -->
					<li class="nav-item ms-3" sec:authorize="isAuthenticated()"><a
						class="nav-link d-flex align-items-center gap-2 text-white"
						th:href="@{/user/orders}"> <img src="https://i.pravatar.cc/40"
							alt="Avatar" class="rounded-circle" width="40" height="40">
							<span sec:authentication="name">User</span>
					</a></li>

				</ul>
			</div>
		</div>
		<!-- /TOP HEADER -->

		<!-- MAIN HEADER -->
		<div id="header">
			<div class="container">
				<div class="row align-items-center">
					<!-- LOGO -->
					<div class="col-md-3">
						<div class="header-logo">
							<a th:href="@{/}" class="logo"> <img
								th:src="@{/fe/img/anh_logo1.png}" alt="Logo"
								style="max-height: 70px">
							</a>
						</div>
					</div>
					<!-- /LOGO -->

					<!-- SEARCH BAR -->
					<div class="col-md-6">
						<div class="header-search">
							<form>
								<select class="input-select">
									<option value="0">All Categories</option>
									<option value="1">Category 01</option>
									<option value="2">Category 02</option>
								</select> <input class="input" placeholder="Search here">
								<button class="search-btn">Search</button>
							</form>
						</div>
					</div>
					<!-- /SEARCH BAR -->

					<!-- ACCOUNT -->
					<div class="col-md-3">
						<div class="header-ctn">
							<div class="dropdown">
								<a class="dropdown-toggle" data-toggle="dropdown" aria-expanded="true">
									<i class="fa fa-shopping-cart"></i>
									<span>Your Cart</span>
									<div id="cart-count" class="qty" th:text="${session.cart != null ? session.cart.totalItems : 0}">0</div>
								</a>
								
								<div class="cart-dropdown">
									<div class="cart-list">
										<!-- Empty Cart -->
										<div th:if="${session.cart == null || session.cart.isEmpty()}" style="text-align: center; padding: 20px;">
											<i class="fa fa-shopping-cart" style="font-size: 3rem; color: #ccc;"></i>
											<p style="color: #999; margin-top: 10px;">Giỏ hàng trống</p>
										</div>
										
										<!-- Cart Items -->
										<div th:if="${session.cart != null && !session.cart.isEmpty()}">
											<div th:each="item : ${session.cart.cartItems}" class="product-widget">
												<div class="product-img">
													<img th:src="@{'/uploads/' + ${item.image}}" 
														th:alt="${item.name}"
														onerror="this.src='/fe/img/product01.png'">
												</div>
												<div class="product-body">
													<h3 class="product-name">
														<a href="#" th:text="${item.name}">Product Name</a>
													</h3>
													<h4 class="product-price">
														<span class="qty" th:text="${item.quantity}">1</span>x
														<span th:text="${#numbers.formatDecimal(item.price, 1, 'COMMA', 0, 'POINT')}">0</span> đ
													</h4>
												</div>
												<button class="delete" onclick="removeFromCartDropdown(this)" th:attr="data-id=${item.id}">
													<i class="fa fa-close"></i>
												</button>
											</div>
										</div>
									</div>
									
									<div th:if="${session.cart != null && !session.cart.isEmpty()}" class="cart-summary">
										<small>
											<span th:text="${session.cart.totalItems}">0</span> sản phẩm
										</small>
										<h5>TỔNG: <span th:text="${#numbers.formatDecimal(session.cart.totalPrice, 1, 'COMMA', 0, 'POINT')}">0</span> đ</h5>
									</div>
									
									<div th:if="${session.cart != null && !session.cart.isEmpty()}" class="cart-btns">
										<a th:href="@{/cart}">Xem giỏ hàng</a>
										<a th:href="@{/checkout}">Thanh toán <i class="fa fa-arrow-circle-right"></i></a>
									</div>
								</div>
							</div>
						</div>
					</div>
					<!-- /ACCOUNT -->
				</div>
			</div>
		</div>
		<!-- /MAIN HEADER -->
	</header>

	<!-- SweetAlert2 -->
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

	<div id="swalMessage" th:text="${message}" style="display: none;"></div>

	<!-- Hiển thị popup nếu có message -->
	<script th:inline="javascript">
	/*<![CDATA[*/
	var messageText = document.getElementById("swalMessage")?.innerText;
	if (messageText && messageText.trim().length > 0) {
		Swal.fire({
			icon: 'success',
			title: messageText,
			confirmButtonText: 'OK',
			confirmButtonColor: '#3085d6'
		});
	}

	// Xóa sản phẩm từ cart dropdown
	function removeFromCartDropdown(button) {
		const productId = button.getAttribute('data-id');
		
		if (!confirm('Bạn có chắc muốn xóa sản phẩm này?')) return;
		
		fetch('/cart/remove/' + productId, {
			method: 'POST',
			headers: {
				'Content-Type': 'application/json'
			}
		})
		.then(response => response.json())
		.then(data => {
			if (data.success) {
				// Reload trang để cập nhật giỏ hàng
				location.reload();
			}
		})
		.catch(error => {
			console.error('Error:', error);
			alert('Có lỗi xảy ra khi xóa sản phẩm');
		});
	}
	/*]]>*/
</script>
</div>
